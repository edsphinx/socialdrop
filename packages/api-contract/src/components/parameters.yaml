Limit:
  name: limit
  in: query
  required: false
  schema: { type: integer, minimum: 1, maximum: 50, default: 20 }
Cursor:
  name: cursor
  in: query
  required: false
  schema: { type: string }
  description: Opaque pagination cursor; null nextCursor means no more pages.
CampaignId:
  name: id
  in: path
  required: true
  schema: { type: integer, minimum: 1 }
ClaimId:
  name: claimId
  in: path
  required: true
  schema: { type: string }
ActiveFilter:
  name: active
  in: query
  required: false
  schema: { type: boolean }
